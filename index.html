<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a3d62">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Badi Zürich">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="badi-app/icons/icon-192.png">
  <link rel="apple-touch-icon" href="badi-app/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Badi Zürich</title>
  <style>
    :root{--water:#0a3d62;--foam:#eaf4fb;--text:#0d1b2a;--muted:#4a6b84;
      --green:#1a7a4a;--green-bg:#e8f5ee;--amber:#b7600a;--amber-bg:#fef3e2;
      --red:#b02020;--red-bg:#fdecea;--gray:#607d8b;--gray-bg:#eceff1;
      --wm:#1a5276;--wp:#aed6f1;
      --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'DM Sans',sans-serif;background:var(--water);color:var(--text);min-height:100dvh;overscroll-behavior:none}
    .hdr{background:var(--water);padding:calc(var(--st)+14px) 16px 16px;position:sticky;top:0;z-index:100}
    .hdr-in{display:flex;align-items:center;justify-content:space-between;max-width:480px;margin:0 auto;gap:12px}
    .title{font-size:21px;font-weight:600;color:#fff;letter-spacing:-.5px}
    .sub{font-size:11px;color:var(--wp);font-family:'DM Mono',monospace;margin-top:2px;display:flex;align-items:center;gap:5px}
    .dot{width:7px;height:7px;border-radius:50%;background:#f44;flex-shrink:0;transition:background .3s}
    .dot.live{background:#4caf50;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .rbtn{background:rgba(255,255,255,.15);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .rbtn:active{background:rgba(255,255,255,.3)}
    .rbtn.spin svg{animation:rot .7s linear infinite}
    @keyframes rot{to{transform:rotate(360deg)}}
    .rbtn svg{width:19px;height:19px;stroke:#fff;fill:none}
    .wave{background:var(--water);line-height:0}.wave svg{display:block;width:100%}
    .content{background:var(--foam);min-height:calc(100dvh - 110px);padding:0 0 calc(var(--sb)+20px)}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:16px 16px 10px;max-width:480px;margin:0 auto}
    .stat{background:#fff;border-radius:10px;padding:11px 8px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .sv{font-size:21px;font-weight:600;color:var(--water);font-family:'DM Mono',monospace;line-height:1}
    .sl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
    .ts{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);text-align:center;padding:0 16px 12px;max-width:480px;margin:0 auto}
    .inner{max-width:480px;margin:0 auto;padding:0 14px}
    .sec{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:6px 0}
    .card{background:#fff;border-radius:16px;padding:14px;margin-bottom:9px;box-shadow:0 2px 10px rgba(0,0,0,.07);position:relative;overflow:hidden}
    .card.closed{opacity:.5}
    .acc{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
    .ct{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .cn{font-size:14px;font-weight:500;color:var(--text);line-height:1.3;flex:1}
    .mv{font-size:23px;font-weight:600;font-family:'DM Mono',monospace;color:var(--water);line-height:1}
    .ml{font-size:10px;color:var(--muted);text-align:right}
    .meta{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
    .bdg{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px}
    .g{background:var(--green-bg);color:var(--green)}.a{background:var(--amber-bg);color:var(--amber)}
    .r{background:var(--red-bg);color:var(--red)}.gr{background:var(--gray-bg);color:var(--gray)}
    .w{background:#e3f2fd;color:var(--wm)}
    .tmp{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
    .hint{font-size:11px;color:var(--muted);font-style:italic;margin-top:5px}
    .bar{background:var(--foam);border-radius:4px;height:4px;margin:9px 0 5px;overflow:hidden}
    .barf{height:4px;border-radius:4px;transition:width .4s}
    .gr2{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
    .cap{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:14px}
    .spin2{width:34px;height:34px;border:3px solid var(--wp);border-top-color:var(--water);border-radius:50%;animation:rot .8s linear infinite}
    .loading p{font-size:13px;color:var(--muted)}
  </style>
</head>
<body>
<div class="hdr">
  <div class="hdr-in">
    <div>
      <div class="title">🏊 Badi Zürich</div>
      <div class="sub"><span class="dot" id="dot"></span><span id="subtext">Verbinde…</span></div>
    </div>
    <button class="rbtn" id="rbtn" onclick="reconnect()" aria-label="Aktualisieren">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
      </svg>
    </button>
  </div>
</div>
<div class="wave">
  <svg viewBox="0 0 1440 40" preserveAspectRatio="none"><path d="M0,20 C360,40 1080,0 1440,20 L1440,40 L0,40 Z" fill="#eaf4fb"/></svg>
</div>
<div class="content">
  <div class="stats" id="stats"></div>
  <div class="ts" id="ts"></div>
  <div class="inner" id="main">
    <div class="loading"><div class="spin2"></div><p>Verbinde mit Live-Feed…</p></div>
  </div>
</div>
<script>
const WS_URL = 'wss://badi-public.crowdmonitor.ch:9591/api';
const NAMES = {
  "flb6939":"Flussbad Oberer Letten","flb6940":"Flussbad Unterer Letten",
  "flb8803":"Flussbad Unterer Letten (Flussteil)","flb6941":"Frauenbad Stadthausquai",
  "fb006":"Freibad Allenmoos","fb008":"Freibad Auhof","fb012":"Freibad Heuried",
  "LETZI-1":"Freibad Letzigraben","SSD-11":"Freibad Seebach",
  "fb018":"Freibad Zwischen den Hölzern","SSD-10":"Seebad Utoquai",
  "BADI-1":"Seebad Enge","seb6946":"Strandbad Mythenquai",
  "seb6947":"Strandbad Tiefenbrunnen","seb6948":"Strandbad Wollishofen",
};
// Flächen in m² – aus Wikipedia-Massen und Satellitenbild-Ausmessungen
// Liegewiesenflächen in m² (Gesamtareal minus Becken/Gebäude/Wege)
// Berechnung: OSM-Gesamtareal × geschätzter Liegewiesen-Anteil
const FL = {
  "Flussbad Oberer Letten":          2200,  // Flusssteg, kaum Liegewiese
  "Flussbad Unterer Letten":         2800,  // geschätzt
  "Flussbad Unterer Letten (Flussteil)": 800, // geschätzt
  "Frauenbad Stadthausquai":          659,  // gemessen (Nutzer)
  "Männerbad Schanzengraben":         879,  // OSM 1'758 × 50%
  "Freibad Allenmoos":              38000,  // Angabe Nutzer
  "Freibad Auhof":                  15400,  // OSM 18'924 − Becken/Gebäude
  "Freibad Heuried":                20000,  // Angabe Nutzer
  "Freibad Letzigraben":            23000,  // Mittelwert verschiedener Quellen
  "Freibad Seebach":                17500,  // Angabe Nutzer
  "Freibad Zwischen den Hölzern":   17500,  // OSM 21'512 − Becken/Gebäude
  "Seebad Enge":                      900,  // Kastenbad, hauptsächlich Holzsteg
  "Seebad Katzensee":                5094,  // OSM 7'277 × 70%
  "Seebad Utoquai":                   900,  // Kastenbad, gleicher Typ wie Seebad Enge
  "Strandbad Mythenquai":           12000,  // ~400m × ~30m Strandstreifen
  "Strandbad Tiefenbrunnen":        21000,  // Angabe Nutzer
  "Strandbad Wollishofen":           5000,  // Angabe Nutzer
};

let liveData = {}, tempStatus = {}, ws = null, retryTimer = null;

function bdg(m2){
  if(m2>=200)return{c:'g',l:'Quasi leer 🏖',d:'#1a7a4a'};
  if(m2>=50) return{c:'g',l:'Sehr viel Platz',d:'#639922'};
  if(m2>=15) return{c:'w',l:'Viel Platz',d:'#2e86c1'};
  if(m2>=5)  return{c:'a',l:'Mässig voll',d:'#EF9F27'};
  return          {c:'r',l:'Sehr voll 🔴',d:'#E24B4A'};
}

function connect() {
  if(retryTimer){clearTimeout(retryTimer);retryTimer=null;}
  try { ws && ws.close(); } catch(e){}

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    ws.send(''); // Trigger: leere Nachricht startet den Datenstrom
    document.getElementById('dot').className = 'dot live';
    document.getElementById('subtext').textContent = 'Live';
    document.getElementById('rbtn').classList.remove('spin');
  };

  ws.onmessage = (e) => {
    try {
      const arr = JSON.parse(e.data);
      if (!Array.isArray(arr) || !arr[0]?.uid) return;
      arr.forEach(item => {
        const name = NAMES[item.uid];
        if (!name) return;
        liveData[name] = {
          name,
          gaeste: parseInt(item.currentfill) || 0,
          maxspace: parseInt(item.maxspace) || 0,
          freespace: parseInt(item.freespace) || 0,
        };
      });
      const now = new Date();
      document.getElementById('dot').className = 'dot live';
      document.getElementById('subtext').textContent = 'Live · ' + now.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      render();
    } catch(ex){}
  };

  ws.onerror = () => {
    document.getElementById('dot').className = 'dot';
    document.getElementById('subtext').textContent = 'Verbindungsfehler';
  };

  ws.onclose = () => {
    document.getElementById('dot').className = 'dot';
    document.getElementById('subtext').textContent = 'Getrennt – verbinde neu…';
    retryTimer = setTimeout(connect, 4000);
  };
}

function reconnect() {
  document.getElementById('rbtn').classList.add('spin');
  document.getElementById('subtext').textContent = 'Verbinde…';
  connect();
  fetchTempStatus();
}

function render() {
  const all = {};
  Object.values(liveData).forEach(b => {
    const ts = tempStatus[b.name] || {};
    all[b.name] = {...b, offen: ts.offen !== undefined ? ts.offen : true, temp: ts.temp||null, hinweis: ts.hinweis||''};
  });
  // Bäder ohne Zähler (Au-Höngg, Männerbad, etc.) aus HTML
  Object.keys(tempStatus).forEach(n => {
    if (!all[n] && !n.includes('Hallenbad') && !n.includes('Wärmebad') && !n.includes('Josel'))
      all[n] = {name:n, gaeste:null, maxspace:0, ...tempStatus[n]};
  });

  const list = Object.values(all);
  if (!list.length) return;

  const offene = list.filter(b=>b.offen);
  const total = list.filter(b=>b.gaeste>0).reduce((s,b)=>s+b.gaeste,0);
  const wm = list.filter(b=>b.gaeste>0&&FL[b.name]);
  const avgM2 = wm.length ? Math.round(wm.reduce((s,b)=>s+FL[b.name]/b.gaeste,0)/wm.length) : 0;

  const now = new Date();
  document.getElementById('ts').textContent = '✓ Live · Stand: '+now.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' Uhr';
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="sv">${offene.length}<span style="font-size:13px;color:var(--muted)">/${list.length}</span></div><div class="sl">Geöffnet</div></div>
    <div class="stat"><div class="sv">${total.toLocaleString('de-CH')}</div><div class="sl">Gäste total</div></div>
    <div class="stat"><div class="sv">${avgM2||'–'}</div><div class="sl">Ø m²/Pers.</div></div>`;

  const sorted = [...list].sort((a,b)=>{
    if(a.offen&&!b.offen)return -1;if(!a.offen&&b.offen)return 1;
    const ma=a.gaeste>0&&FL[a.name]?FL[a.name]/a.gaeste:0;
    const mb=b.gaeste>0&&FL[b.name]?FL[b.name]/b.gaeste:0;
    if(ma&&!mb)return -1;if(!ma&&mb)return 1;return mb-ma;
  });

  const open=sorted.filter(b=>b.offen), closed=sorted.filter(b=>!b.offen);
  let html='';
  if(open.length){html+=`<div class="sec">Geöffnet (${open.length})</div>`;html+=open.map(card).join('');}
  if(closed.length){html+=`<div class="sec" style="margin-top:8px">Geschlossen (${closed.length})</div>`;html+=closed.map(card).join('');}
  document.getElementById('main').innerHTML = html;
}

function card(b) {
  const fl=FL[b.name], m2=(b.gaeste>0&&fl)?Math.round(fl/b.gaeste):null;
  const s=m2?bdg(m2):null, bar=m2?Math.min(100,Math.round(m2/2)):0;
  const pct=b.maxspace>0?Math.round(b.gaeste/b.maxspace*100):null;
  const acc=!b.offen?'#ccc':(s?.d||'#ccc');
  const m2h=m2?`<div class="mv">${m2>999?m2.toLocaleString('de-CH'):m2} m²</div><div class="ml">m² Liegewiese/Pers.</div>`:`<div class="mv" style="color:var(--gray)">–</div>`;
  const bg=b.offen?(s?`<span class="bdg ${s.c}">${s.l}</span>`:`<span class="bdg gr">Keine Zählung</span>`):`<span class="bdg gr">Geschlossen</span>`;
  const tmp=b.temp?`<span class="tmp">💧 ${b.temp}°C</span>`:'';
  const hint=b.hinweis?`<div class="hint">${b.hinweis}</div>`:'';
  const cap=pct!==null?`<div class="cap">${pct}% belegt · ${(b.maxspace-b.gaeste).toLocaleString('de-CH')} frei</div>`:'';
  const fl_str=fl?(fl>=1000?(fl/1000).toFixed(0)+"'000":fl)+' m²':'';
  return `<div class="card${!b.offen?' closed':''}">
    <div class="acc" style="background:${acc}"></div>
    <div class="ct"><div class="cn">${b.name}</div><div style="text-align:right;flex-shrink:0">${m2h}</div></div>
    <div class="meta">${bg}${tmp}</div>${hint}
    ${m2?`<div class="bar"><div class="barf" style="width:${bar}%;background:${s.d}"></div></div>`:''}
    <div class="gr2"><span>${b.gaeste>0?b.gaeste.toLocaleString('de-CH')+' Gäste':b.offen?'Keine Zählung':'Geschlossen'}</span><span>${fl_str}</span></div>
    ${cap}</div>`;
}

async function fetchTempStatus() {
  const T='https://www.stadt-zuerich.ch/de/stadtleben/sport-und-erholung/sport-und-badeanlagen/sommerbaeder/badi-aktuell.html';
  try {
    const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(T),{signal:AbortSignal.timeout(10000)});
    if(!r.ok)return;
    const doc=new DOMParser().parseFromString((await r.json()).contents||'','text/html');
    doc.querySelectorAll('table tbody tr').forEach(row=>{
      const c=row.querySelectorAll('td');
      if(c.length<3)return;
      const n=c[0]?.textContent?.trim();
      if(n)tempStatus[n]={temp:parseFloat(c[1]?.textContent)||null,offen:c[2]?.textContent?.trim()==='offen',hinweis:c[3]?.textContent?.trim()||''};
    });
    if(Object.keys(liveData).length>0)render();
  }catch(e){}
}

if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});

connect();
fetchTempStatus();
setInterval(fetchTempStatus, 10*60*1000); // Temp/Status alle 10 Min
</script>
</body>
</html>
